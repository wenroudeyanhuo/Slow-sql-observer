<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slow SQL Observer</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body data-page="overview">
    <header class="shell-header">
      <div>
        <p class="eyebrow">Slow SQL Observer</p>
        <h1>Overview</h1>
      </div>
      <nav>
        <a href="/index.html">Overview</a>
        <a href="/fingerprints.html">Fingerprints</a>
      </nav>
    </header>
    <main class="layout">
      <section id="source-context"></section>
      <section class="card metrics" id="overview-metrics"></section>
      <section class="card">
        <div class="section-head">
          <div>
            <h2>Top Fingerprints</h2>
            <p class="eyebrow" id="overview-threshold"></p>
          </div>
          <div class="section-actions">
            <form id="overview-filters" class="filters inline-filters">
              <input name="minQueryTimeSec" type="number" min="0" step="0.1" placeholder="Min query time (sec)">
              <button type="submit">Apply</button>
            </form>
            <a class="button-link" href="/fingerprints.html">View all</a>
          </div>
        </div>
        <div id="overview-top"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
