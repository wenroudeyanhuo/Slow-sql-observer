<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fingerprint Detail</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body data-page="detail">
    <header class="shell-header">
      <div>
        <p class="eyebrow">Slow SQL Observer</p>
        <h1>Fingerprint Detail</h1>
      </div>
      <nav>
        <a href="/index.html">Overview</a>
        <a href="/fingerprints.html">Fingerprints</a>
      </nav>
    </header>
    <main class="layout">
      <section id="source-context"></section>
      <section class="card">
        <form id="detail-filters" class="filters inline-filters">
          <input name="minQueryTimeSec" type="number" min="0" step="0.1" placeholder="Min query time (sec)">
          <button type="submit">Apply</button>
        </form>
        <p class="eyebrow" id="detail-threshold"></p>
      </section>
      <section class="card" id="fingerprint-detail"></section>
      <section class="card">
        <div class="section-head">
          <div>
            <h2>Fingerprint Trend</h2>
            <p class="eyebrow" id="detail-trend-summary"></p>
          </div>
        </div>
        <form id="detail-trend-filters" class="filters">
          <select name="trendBucket">
            <option value="day">Daily buckets</option>
            <option value="hour">Hourly buckets</option>
          </select>
          <select name="trendDays">
            <option value="1">1 day</option>
            <option value="2">2 days</option>
            <option value="7">7 days</option>
            <option value="30">30 days</option>
          </select>
          <button type="submit">Update trend</button>
        </form>
        <div id="fingerprint-trend"></div>
      </section>
      <section class="card">
        <div class="section-head">
          <h2>Sample Records</h2>
        </div>
        <div id="fingerprint-records"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
